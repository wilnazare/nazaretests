<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nazaré innovation spark</title>
  <style>
    :root {
      --nazare-plum: #2a034c;
      --nazare-purple: #451284;
      --nazare-magenta: #b502b1;
      --nazare-teal: #00ca9f;
      --nazare-blue: #41bce5;
      --nazare-paper: #fffdfb;
      --nazare-ink: #26223b;
      --nazare-muted: #66667a;
      --nazare-line: rgba(42, 3, 76, 0.12);
      --nazare-soft: rgba(69, 18, 132, 0.06);
      --note: #ffef9d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Montserrat", "Aptos", "Segoe UI", sans-serif;
      color: var(--nazare-ink);
      background:
        radial-gradient(circle at top left, rgba(0, 202, 159, 0.14), transparent 24rem),
        radial-gradient(circle at top right, rgba(181, 2, 177, 0.12), transparent 22rem),
        linear-gradient(180deg, #faf9ff 0%, #edf1fb 100%);
    }

    .shell {
      width: min(100% - 32px, 980px);
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .hero {
      padding: 24px;
      border: 1px solid var(--nazare-line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 20px 40px rgba(42, 3, 76, 0.08);
      backdrop-filter: blur(8px);
    }

    .kicker {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--nazare-magenta);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: var(--nazare-plum);
    }

    .lede {
      max-width: 720px;
      margin: 14px 0 0;
      font-size: 18px;
      line-height: 1.45;
      color: var(--nazare-muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(42, 3, 76, 0.1);
    }

    .btn-primary {
      background: var(--nazare-plum);
      color: white;
    }

    .btn-secondary {
      background: white;
      color: var(--nazare-plum);
      border: 1px solid var(--nazare-line);
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .card {
      padding: 18px;
      border-radius: 20px;
      border: 1px solid var(--nazare-line);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 12px 26px rgba(42, 3, 76, 0.06);
    }

    .card--idea {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.9)),
        linear-gradient(135deg, rgba(255, 239, 157, 0.45), rgba(255, 255, 255, 0));
    }

    .card--twist {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.9)),
        linear-gradient(135deg, rgba(0, 202, 159, 0.18), rgba(255, 255, 255, 0));
    }

    .label {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--nazare-purple);
      background: var(--nazare-soft);
    }

    .title {
      margin: 0;
      font-size: 27px;
      line-height: 1.02;
      letter-spacing: -0.04em;
      color: var(--nazare-plum);
    }

    .category {
      margin: 10px 0 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--nazare-magenta);
    }

    .body {
      margin: 10px 0 0;
      font-size: 15px;
      line-height: 1.45;
      color: var(--nazare-muted);
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100% - 20px, 980px);
        padding-top: 18px;
      }

      .hero {
        padding: 18px;
        border-radius: 18px;
      }

      .title {
        font-size: 24px;
      }

      .body {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="kicker">Nazaré hackathon</p>
      <h1>Innovation spark</h1>
      <p class="lede">Need some inspiration on how to overcome your constraints? Tap below. Tap again for more suggestions.</p>

      <div class="controls">
        <button class="btn-primary" id="inspireBtn" type="button">Inspire me</button>
        <button class="btn-secondary" id="twistBtn" type="button">Add a twist</button>
      </div>

      <div class="results" id="results"></div>
    </section>
  </main>

  <script>
    const ideas = [
      { title: "Remove A Handoff", category: "Remove friction", prompt: "What if you removed a handoff?" },
      { title: "Own It End To End", category: "Remove friction", prompt: "What if one team owned this end to end?" },
      { title: "Stop A Legacy Activity", category: "Remove friction", prompt: "What if you stopped doing one legacy activity?" },
      { title: "Cut The Process In Half", category: "Remove friction", prompt: "What if you cut the process in half?" },
      { title: "Remove An Approval Step", category: "Remove friction", prompt: "What if you removed one approval step?" },
      { title: "Hide Internal Complexity", category: "Remove friction", prompt: "What if the customer never saw your internal complexity?" },

      { title: "Change The Metric First", category: "Change the signal", prompt: "What if you changed the metric first?" },
      { title: "Measure Quality, Not Volume", category: "Change the signal", prompt: "What if success was measured by quality, not volume?" },
      { title: "Share One Goal", category: "Change the signal", prompt: "What if you shared one goal across functions?" },
      { title: "Prioritise Follow-Through", category: "Change the signal", prompt: "What if cross-functional follow-through became the priority?" },
      { title: "Treat It As Behaviour Change", category: "Change the signal", prompt: "What if you treated this as a behaviour-change challenge, not a process problem?" },

      { title: "No Extra Budget", category: "Work with the constraint", prompt: "What if you had no extra budget at all?" },
      { title: "Use Existing People And Tools", category: "Work with the constraint", prompt: "What if you had to do this with the people and tools you already have?" },
      { title: "No New Technology", category: "Work with the constraint", prompt: "What if you had to solve this without adding new technology?" },
      { title: "Progress Before Readiness", category: "Work with the constraint", prompt: "What if you had to make progress before the organisation is fully ready?" },
      { title: "Update The Process This Week", category: "Work with the constraint", prompt: "What if you had to update your process this week?" },
      { title: "Use The Constraint As A Clue", category: "Work with the constraint", prompt: "What if the constraint is the clue to a better answer?" },

      { title: "Co-Design With The Customer", category: "Reframe the customer", prompt: "What if the customer helped design the solution?" },
      { title: "Default To Next-Gen Expectations", category: "Reframe the customer", prompt: "What if next-gen HCP expectations were your default?" },
      { title: "Make It Irresistible", category: "Reframe the customer", prompt: "What if you had to make this irresistible to the customer?" },
      { title: "Focus On The Moment That Matters", category: "Reframe the customer", prompt: "What if you focused on one moment that matters most?" },

      { title: "Prove Value In 30-90 Days", category: "Test and learn", prompt: "What if you had to prove value in 30-90 days?" },
      { title: "Use AI For Low-Value Tasks", category: "Test and learn", prompt: "What if AI handled the lowest-value tasks?" },
      { title: "Find The Real Bottleneck", category: "Test and learn", prompt: "What if one missing capability was the real bottleneck?" },

      { title: "Try The Opposite Approach", category: "Challenge assumptions", prompt: "What if the opposite of your current approach is closer to the answer?" },
      { title: "Start From Scratch", category: "Challenge assumptions", prompt: "What if you designed this as if you were starting from scratch today?" },
      { title: "Name The Real Barrier", category: "Challenge assumptions", prompt: "What if the real barrier is the thing nobody wants to name?" },
      { title: "Solve It By Doing Less", category: "Challenge assumptions", prompt: "What if you solved this by doing less, not more?" },
      { title: "Choose Bold Simplicity", category: "Challenge assumptions", prompt: "What if the boldest option is also the simplest?" },
      { title: "Do Not Wait For Permission", category: "Challenge assumptions", prompt: "What if you had to make this work without waiting for permission?" },
      { title: "Borrow From Another Industry", category: "Challenge assumptions", prompt: "What if you borrowed the answer from a completely different industry?" }
    ];

    const resultsEl = document.getElementById("results");
    const inspireBtn = document.getElementById("inspireBtn");
    const twistBtn = document.getElementById("twistBtn");

    let currentResults = [];

    function sample(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function sampleExcept(array, excludedPrompts) {
      const pool = array.filter((item) => !excludedPrompts.has(item.prompt));
      return sample(pool.length ? pool : array);
    }

    function renderCards(cards) {
      currentResults = cards;
      resultsEl.innerHTML = cards.map((card) => {
        if (card.type === "twist") {
          return `
            <article class="card card--twist">
              <span class="label">Twist</span>
              <h2 class="title">${card.title}</h2>
              <p class="category">${card.category}</p>
              <p class="body">${card.prompt}</p>
            </article>
          `;
        }

        return `
          <article class="card card--idea">
            <span class="label">Inspiration</span>
            <h2 class="title">${card.title}</h2>
            <p class="category">${card.category}</p>
            <p class="body">${card.prompt}</p>
          </article>
        `;
      }).join("");
    }

    function inspire() {
      renderCards([sample(ideas)]);
    }

    function addTwist() {
      const baseCards = currentResults.filter((item) => item.type !== "twist");
      const visibleCards = baseCards.length ? baseCards : [sample(ideas)];
      const excludedPrompts = new Set(visibleCards.map((item) => item.prompt));
      const twistCard = {
        ...sampleExcept(ideas, excludedPrompts),
        type: "twist"
      };

      renderCards([...visibleCards, twistCard]);
    }

    inspireBtn.addEventListener("click", inspire);
    twistBtn.addEventListener("click", addTwist);

    inspire();
  </script>
</body>
</html>
