  <title>Curated Skills Sunburst</title>
  <style>
    body {
      margin: 0;
      background: #f8f7f4;
      font-family: Aptos, Calibri, Arial, sans-serif;
      color: #1f2937;
    }
    .wrap {
      max-width: 1360px;
      margin: 0 auto;
      padding: 28px 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(720px, 1fr) 360px;
      gap: 20px;
      align-items: start;
    }
    .viz-card, .detail-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }
    .viz-card {
      overflow: hidden;
      position: relative;
    }
    .viz-header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      padding: 26px 30px 8px;
    }
    .viz-eyebrow {
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.09em;
      margin-bottom: 7px;
      text-transform: uppercase;
    }
    .viz-title {
      font-size: clamp(28px, 3vw, 42px);
      line-height: 0.95;
      margin: 0;
      letter-spacing: -0.04em;
    }
    .viz-subtitle {
      color: #475569;
      font-size: 14px;
      line-height: 1.45;
      margin: 10px 0 0;
      max-width: 620px;
    }
    .viz-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      min-width: 210px;
    }
    .chip {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      color: #334155;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 10px;
      white-space: nowrap;
    }
    .viz-frame {
      display: flex;
      justify-content: center;
      padding: 0 18px 22px;
    }
    .chart-tooltip {
      background: rgba(15, 23, 42, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.22);
      color: white;
      font-size: 13px;
      left: 0;
      line-height: 1.35;
      max-width: 270px;
      opacity: 0;
      padding: 10px 12px;
      pointer-events: none;
      position: absolute;
      top: 0;
      transform: translate(-999px, -999px);
      transition: opacity 120ms ease;
      z-index: 5;
    }
    .chart-tooltip.is-visible {
      opacity: 1;
    }
    .tooltip-title {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 3px;
    }
    .tooltip-meta {
      color: #cbd5e1;
      display: block;
      font-size: 12px;
    }
    svg {
      width: min(100%, 940px);
      height: auto;
      display: block;
      background: white;
    }
    .detail-card {
      padding: 20px 20px 18px;
      position: sticky;
      top: 20px;
      max-height: calc(100vh - 40px);
      overflow: auto;
    }
    .detail-kicker {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .detail-title {
      font-size: 26px;
      line-height: 1.15;
      margin: 0 0 8px;
    }
    .detail-meta {
      color: #475569;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .detail-section-title {
      margin: 16px 0 8px;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .detail-list {
      margin: 0;
      padding-left: 18px;
      color: #1f2937;
      font-size: 14px;
      line-height: 1.4;
    }
    .detail-list li {
      margin-bottom: 6px;
    }
    .detail-helper {
      color: #64748b;
      font-size: 14px;
      line-height: 1.45;
      margin: 0;
    }
    .detail-actions {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .heading-button {
      align-items: center;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      color: #1f2937;
      cursor: pointer;
      display: grid;
      font: inherit;
      grid-template-columns: 14px 1fr auto;
      gap: 10px;
      padding: 10px 11px;
      text-align: left;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }
    .heading-button:hover,
    .heading-button:focus-visible {
      border-color: #94a3b8;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
      outline: none;
      transform: translateY(-1px);
    }
    .swatch {
      border-radius: 999px;
      height: 12px;
      width: 12px;
    }
    .heading-name {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
    }
    .count-badge {
      background: #f8fafc;
      border-radius: 999px;
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
      padding: 4px 8px;
    }
    @media (max-width: 1200px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .detail-card {
        position: static;
        max-height: none;
      }
    }
    @media (max-width: 760px) {
      .wrap {
        padding: 14px;
      }
      .viz-header {
        display: block;
        padding: 20px 18px 4px;
      }
      .viz-chips {
        justify-content: flex-start;
        margin-top: 14px;
      }
      .viz-frame {
        padding: 0 6px 12px;
      }
    }
  </style>
</head>

        <div class="chart-tooltip" id="chart-tooltip" role="status" aria-live="polite"></div>
      </div>
      <aside class="detail-card" id="detail-panel">
      </aside>

  </div>
  <script>
    const segments = Array.from(document.querySelectorAll('.segment'));
    const headings = Array.from(document.querySelectorAll('.segment-heading'));
    const chart = document.querySelector('.viz-card');
    const panel = document.getElementById('detail-panel');
    const tooltip = document.getElementById('chart-tooltip');
    let pinned = null;

    function escapeHTML(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderList(items, emptyMessage) {
      if (!items.length) {
        return `<p class="detail-helper">${escapeHTML(emptyMessage)}</p>`;
      }
      return `<ul class="detail-list">${items.map(item => `<li>${escapeHTML(item)}</li>`).join('')}</ul>`;
    }

    function headingList() {
      return headings.map(heading => `
        <button class="heading-button" type="button" data-heading-link="${escapeHTML(heading.dataset.heading)}">
          <span class="swatch" style="background: ${escapeHTML(heading.dataset.color || '#64748b')}"></span>
          <span class="heading-name">${escapeHTML(heading.dataset.heading)}</span>
          <span class="count-badge">${escapeHTML(heading.dataset.total)}% of job adverts</span>
        </button>
      `).join('');
    }

    function subskillList(headingName) {
      const heading = headings.find(item => item.dataset.heading === headingName);
      const color = heading?.dataset.color || '#64748b';
      const subskills = segments
        .filter(seg => seg.dataset.type === 'subskill' && seg.dataset.heading === headingName)
        .sort((a, b) => Number(b.dataset.jds || 0) - Number(a.dataset.jds || 0));

      if (!subskills.length) {
        return `<p class="detail-helper">No subskills available.</p>`;
      }

      return `<div class="detail-actions">${subskills.map(seg => `
        <button
          class="heading-button"
          type="button"
          data-subskill-heading="${escapeHTML(seg.dataset.heading)}"
          data-subskill-link="${escapeHTML(seg.dataset.subskill)}"
        >
          <span class="swatch" style="background: ${escapeHTML(color)}"></span>
          <span class="heading-name">${escapeHTML(seg.dataset.subskill)}</span>
          <span class="count-badge">${escapeHTML(seg.dataset.pct)} of job adverts</span>
        </button>
      `).join('')}</div>`;
    }

    function renderHomePanel() {
      panel.innerHTML = `
        <div class="detail-kicker">Explore</div>
        <h2 class="detail-title">Pick a skill family</h2>
        <div class="detail-meta">Use the colour list or the sunburst slices. Click once to keep a selection open.</div>
        <div class="detail-section-title">Headings by total demand</div>
        <div class="detail-actions">${headingList()}</div>
      `;
    }

    function updatePanel(el) {
      const type = el.dataset.type;
      if (type === 'heading') {
        panel.innerHTML = `
          <div class="detail-kicker">Main heading</div>
          <h2 class="detail-title">${escapeHTML(el.dataset.heading)}</h2>
          <div class="detail-meta">${escapeHTML(el.dataset.total)}% of job adverts</div>
          <div class="detail-section-title">Top subskills</div>
          ${subskillList(el.dataset.heading)}
        `;
      } else {
        const phrases = (el.dataset.memberPhrases || '').split(' | ').filter(Boolean);
        panel.innerHTML = `
          <div class="detail-kicker">${escapeHTML(el.dataset.heading)}</div>
          <h2 class="detail-title">${escapeHTML(el.dataset.subskill)}</h2>
          <div class="detail-meta">${escapeHTML(el.dataset.pct)} of job adverts</div>
          <div class="detail-section-title">Common phrases</div>
          ${renderList(phrases, 'No common phrases available.')}
        `;
      }
    }

    function clearPanel() {
      if (pinned) return;
      renderHomePanel();
    }

    function tooltipHTML(el) {
      if (el.dataset.type === 'heading') {
        return `
          <span class="tooltip-title">${escapeHTML(el.dataset.label || el.dataset.heading)}</span>
          <span class="tooltip-meta">${escapeHTML(el.dataset.total)}% of job adverts</span>
        `;
      }
      return `
        <span class="tooltip-title">${escapeHTML(el.dataset.label || el.dataset.subskill)}</span>
        <span class="tooltip-meta">${escapeHTML(el.dataset.pct)} of job adverts</span>
        <span class="tooltip-meta">${escapeHTML(el.dataset.heading)}</span>
      `;
    }

    function showTooltip(el, event) {
      tooltip.innerHTML = tooltipHTML(el);
      tooltip.classList.add('is-visible');
      moveTooltip(event);
    }

    function moveTooltip(event) {
      if (!event || !tooltip.classList.contains('is-visible')) return;
      const chartRect = chart.getBoundingClientRect();
      const tooltipRect = tooltip.getBoundingClientRect();
      const padding = 14;
      const x = Math.min(
        event.clientX - chartRect.left + 16,
        chartRect.width - tooltipRect.width - padding
      );
      const y = Math.min(
        event.clientY - chartRect.top + 16,
        chartRect.height - tooltipRect.height - padding
      );
      tooltip.style.transform = `translate(${Math.max(padding, x)}px, ${Math.max(padding, y)}px)`;
    }

    function hideTooltip() {
      tooltip.classList.remove('is-visible');
      tooltip.style.transform = 'translate(-999px, -999px)';
    }

    function setActive(target) {
      const activeHeading = target.dataset.heading;
      segments.forEach(seg => {
        const isActive = seg === target;
        const isSameFamily = seg.dataset.heading === activeHeading;
        seg.classList.toggle('is-active', isActive);
        seg.classList.toggle('is-dimmed', !isSameFamily);
        if (isActive) {
          seg.setAttribute('transform', `translate(${seg.dataset.dx || 0}, ${seg.dataset.dy || 0})`);
        } else {
          seg.removeAttribute('transform');
        }
      });
      updatePanel(target);
    }

    function clearActive() {
      if (pinned) return;
      segments.forEach(seg => {
        seg.classList.remove('is-active', 'is-dimmed');
        seg.removeAttribute('transform');
      });
      clearPanel();
    }

    segments.forEach(seg => {
      seg.addEventListener('mouseenter', event => {
        if (pinned && pinned !== seg) return;
        setActive(seg);
        showTooltip(seg, event);
      });
      seg.addEventListener('mousemove', event => {
        if (pinned && pinned !== seg) return;
        moveTooltip(event);
      });
      seg.addEventListener('mouseleave', () => {
        hideTooltip();
        if (!pinned) clearActive();
      });
      seg.addEventListener('click', event => {
        if (pinned === seg) {
          pinned = null;
          hideTooltip();
          clearActive();
          return;
        }
        pinned = seg;
        setActive(seg);
        showTooltip(seg, event);
      });
      seg.addEventListener('keydown', event => {
        if (event.key !== 'Enter' && event.key !== ' ') return;
        event.preventDefault();
        pinned = pinned === seg ? null : seg;
        pinned ? setActive(seg) : clearActive();
      });
    });

    panel.addEventListener('click', event => {
      const headingButton = event.target.closest('[data-heading-link]');
      const subskillButton = event.target.closest('[data-subskill-link]');
      if (!headingButton && !subskillButton) return;

      const target = headingButton
        ? headings.find(heading => heading.dataset.heading === headingButton.dataset.headingLink)
        : segments.find(seg =>
            seg.dataset.type === 'subskill' &&
            seg.dataset.heading === subskillButton.dataset.subskillHeading &&
            seg.dataset.subskill === subskillButton.dataset.subskillLink
          );
      if (!target) return;
      pinned = target;
      hideTooltip();
      setActive(target);
    });

    document.addEventListener('click', event => {
      if (
        event.target.closest('.segment') ||
        event.target.closest('[data-heading-link]') ||
        event.target.closest('[data-subskill-link]')
      ) return;
      pinned = null;
      hideTooltip();
      clearActive();
    });

    renderHomePanel();
  </script>
</body>
</html>
